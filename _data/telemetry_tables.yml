tables:
  # ===================== PROJECT MODE =====================

  - id: kbc_bucket_snapshot
    mode: project
    description: "This table shows snapshots of buckets in Storage."
    is_full_load: false
    columns:
      - name: bucket_id
        pk: true
        description: "Identifier for the storage bucket"
        example: "`1147628`"
      - name: kbc_project_id
        pk: true
        fk: kbc_project
        description: "Foreign key to a Keboola project"
        example: "`866_kbc-eu-central-1`"
      - name: snapshot_date
        pk: true
        description: "Date of the data snapshot"
        example: "`2020-06-30`"
      - name: stage
        description: "Storage stage of the bucket"
        example: "`in`"
      - name: bucket
        description: "Default name of the bucket"
        example: "`c-instagram`"
      - name: bucket_display_name
        description: "Name of the bucket that can be changed by the user (if not changed, it is the same as `bucket` without `c-` at the beginning)"
        example: "`instagram_posts`"
      - name: rows
        description: "Number of rows in the bucket as of the date of the snapshot"
        example: "`4714`"
      - name: bytes
        description: "Size of the bucket in bytes as of the date of the snapshot"
        example: "`1870336`"
      - name: sharing_type
        description: "Type of bucket sharing (Data Catalog). <br> Possible values: `none` -- not shared, <br> `target` -- bucket linked from another project, <br>`source` / `org private` -- bucket shared from this project, linkable only by organization members <br> `source` / `org public` -- bucket shared from this project, linkable by any project members"
        example: "`target`"
      - name: shared_from_project_id
        description: "Identifier of the source project if the bucket is linked (sharing_type = 'target')"
        example: "`860_kbc-eu-central-1`"
      - name: shared_from_bucket
        description: "Identifier of the source bucket if the bucket is linked (sharing_type = 'target')"
        example: "`in.c-keboola-ex-instagram-152387726`"
      - name: is_external_schema
        description: "Flag indicating if the bucket contains data from external sources (`1`, `0`)"
        example: "`1`"
      - name: kbc_branch_id
        pk: true
        fk: kbc_branch
        description: "Foreign key to the Keboola branch"
        example: "`3419_kbc-eu-central-1`"
      - name: kbc_bucket_owner_id
        description: "Optional field indicating who is responsible for shared data, used for tracking ownership in bucket sharing and the data catalog"
        example: "`11358_kbc-eu-central-1`"

  - id: kbc_branch
    mode: project
    description: "This table shows main and development [branches](/components/branches/) in the project."
    is_full_load: false
    columns:
      - name: kbc_branch_id
        pk: true
        description: "Keboola Branch identifier"
        example: "`3419_kbc-eu-central-1`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to a Keboola project"
        example: "`866_kbc-eu-central-1`"
      - name: kbc_branch
        description: "Name of the branch"
        example: "`My dev branch`"
      - name: kbc_branch_created_at
        description: "Datetime of the branch creation"
        example: "`2022-05-18 06:13:45`"
      - name: is_default
        description: "Determines if the branch is the main (default) branch (`true`, `false`)"
        example: "`false`"
      - name: token_id
        description: "Identifier of the token that created this branch"
        example: "`241247`"
      - name: token_name
        description: "Name of the token that created this branch"
        example: "`john.doe@keboola.com`"
      - name: kbc_token_id
        description: "Unique identifier of the token containing stack identification"
        example: "`241247_kbc-us-east-1`"

  - id: kbc_component_configuration
    mode: project
    description: "This table lists the [configurations of components](/components/#creating-component-configuration) (e.g., a configuration of the AWS S3 data source connector)."
    is_full_load: true
    note: "The table is always extracted in full."
    columns:
      - name: kbc_component_configuration_id
        pk: true
        description: "Identifier for the component configuration"
        example: "`580_kbc-us-east-1_keboola.python- transformation-v2-610931033`"
      - name: kbc_component_configuration_url
        description: "URL of the configuration in the Keboola project"
        example: "`https://connection.keboola.com/ admin/projects/580/transformations/ bucket/152336525`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola project"
        example: "`580_kbc-us-east-1`"
      - name: kbc_component_id
        description: "Identifier of the component"
        example: "`keboola.python-transformation-v2`"
      - name: kbc_component
        description: "Name of the component"
        example: "`Generic`"
      - name: kbc_component_type
        description: "Identifier of the component type"
        example: "`extractor`"
      - name: kbc_component_vendor
        description: "Identifier of the component creator"
        example: "`keboola`"
      - name: kbc_component_listing
        description: "Identifier of the component visibility (`public`, `private`)"
        example: "`public`"
      - name: configuration_id_num
        description: "Numeric identifier of the configuration"
        example: "`610931033`"
      - name: kbc_component_configuration
        description: "Name of the configuration"
        example: "`Sample data from Dynamics`"
      - name: configuration_created
        description: "Datetime when the configuration was created"
        example: "`2022-07-20 18:45:17`"
      - name: kbc_configuration_version
        description: "Current version of the configuration"
        example: "`5`"
      - name: kbc_configuration_is_deleted
        description: "Flag indicating whether the configuration is deleted (`true`, `false`)"
        example: "`false`"
      - name: description
        description: "Description of the component configuration (filled by the user)"
        example: "`This transformation put the data from customers into standardize format.`"
      - name: configuration_json
        description: "Complete JSON configuration of the component"
        example: "`{\"parameters\":{\"id\":\"34289954\"}}`"
      - name: kbc_branch_id
        fk: kbc_branch
        description: "Foreign key to a Keboola branch"
        example: "`3419_kbc-eu-central-1`"
      - name: branch_type
        description: "Differentiate between the default (production) and development branch"
        example: "`default`"
      - name: token_id
        description: "Identifier of the token that created this version of the configuration"
        example: "`241247`"
      - name: token_name
        description: "Name of the token that created this version of the configuration"
        example: "`john.doe@keboola.com`"
      - name: kbc_token_id
        description: "Unique identifier of the token containing stack identification"
        example: "`241247_kbc-us-east-1`"
      - name: folder_name
        description: "Unique identifier of the token containing stack identification"
        example: "`Archive`"

  - id: kbc_component_configuration_version
    mode: project
    description: "This table shows the [version history](/components/#configuration-versions) of the component configuration."
    is_full_load: false
    columns:
      - name: kbc_component_configuration_id
        pk: true
        fk: kbc_component_configuration
        description: "Identifier for the component configuration"
        example: "`6610_kbc-us-east-1_orchestrator-583757303`"
      - name: kbc_branch_id
        pk: true
        fk: kbc_branch
        description: "Foreign key to the Keboola branch"
        example: "`3419_kbc-eu-central-1`"
      - name: configuration_updated_at
        description: "Datetime when the configuration was updated"
        example: "`2020-03-28 20:29:25`"
      - name: change_description
        description: "Description of what changed in the configuration"
        example: "`Update orchestration notifications`"
      - name: configuration_version
        pk: true
        description: "Version of the configuration"
        example: "`3`"
      - name: last_version
        description: "Flag indicating whether this is the last version of the configuration (`true`, `false`)"
        example: "`false`"
      - name: token_id
        description: "Identifier of the token that created this version of the configuration"
        example: "`241247`"
      - name: token_name
        description: "Name of the token that created this version of the configuration"
        example: "`john.doe@keboola.com`"
      - name: kbc_token_id
        description: "Unique identifier of the token containing stack identification"
        example: "`241247_kbc-us-east-1`"

  - id: kbc_component_configuration_row
    mode: project
    description: "This table lists rows of the [configurations for the components](/components/#creating-component-configuration) (e.g., a configuration for a single table in the Snowflake data destination connector)."
    is_full_load: false
    columns:
      - name: kbc_component_configuration_row_id
        pk: true
        description: "Component configuration row identifier"
        example: "`8765_kbc-us-east-1_keboola.ex-db-mysql_844500148_844500150`"
      - name: kbc_component_configuration_id
        fk: kbc_component_configuration
        description: "Foreign key to the Keboola component configuration"
        example: "`8765_kbc-us-east-1_keboola.ex-db-mysql_844500148`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola project"
        example: "`8765_kbc-us-east-1`"
      - name: kbc_component_id
        description: "Identifier of the component"
        example: "`keboola.ex-db-mysql_kbc-us-east-1`"
      - name: configuration_row_id_num
        description: "Numeric identifier of the configuration row"
        example: "`844500150`"
      - name: kbc_component_configuration_row
        description: "Name of the configuration row"
        example: "`test_view`"
      - name: configuration_row_created
        description: "Datetime of the configuration row's creation"
        example: "`2022-04-25 11:59:42`"
      - name: kbc_configuration_row_version
        description: "Current version of the configuration row"
        example: "`1`"
      - name: kbc_configuration_row_is_disabled
        description: "Flag indicating whether the configuration row is disabled (`true`, `false`)"
        example: "`false`"
      - name: kbc_configuration_row_is_deleted
        description: "Flag indicating whether the configuration row is deleted (`true`, `false`)"
        example: "`false`"
      - name: description
        description: "Description of the component configuration row (filled by the user)"
        example: "`This part of transformation consolidate the data from various sources.`"
      - name: configuration_row_json
        description: "Complete JSON configuration row of the component"
        example: "`{\"parameters\":{\"incremental\":false}}`"
      - name: token_id
        description: "Identifier of the token that created this version of the configuration row"
        example: "`241247`"
      - name: token_name
        description: "Name of the token that created this version of the configuration"
        example: "`john.doe@keboola.com`"
      - name: kbc_token_id
        description: "Unique identifier of the token containing stack identification"
        example: "`241247_kbc-us-east-1`"

  - id: kbc_data_app_workspace
    mode: project
    description: "This table lists runs of [apps](/data-apps/) and their consumption metrics."
    is_full_load: false
    note: "A value of `0` in `data_app_runtime_hours`,`time_credits_used` or `billed_credits_used` means a correction was made. The row couldn't be removed due to incremental loads, so the original value was set to zero."
    columns:
      - name: kbc_data_app_workspace_run_id
        pk: true
        description: "Identifier of the workspace active window (between starting and pausing the sandbox)"
        example: "`10910_kbc-eu-central-1_8c9e68ac-3a40-4aea-a62c-34ef37d12a5a`"
      - name: kbc_data_app_workspace_id
        description: "App workspace identifier"
        example: "`10910_kbc-eu-central-1`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola Project"
        example: "`1075-eu-central-1`"
      - name: date
        pk: true
        description: "Date for which the runtime hours and time credits are calculated"
        example: "`2020-11-27`"
      - name: created_at
        description: "Datetime of the workspace creation"
        example: "`2020-11-27 11:22:08`"
      - name: expiration_at
        description: "Workspace expiration datetime"
        example: "`2020-12-02 11:22:08`"
      - name: updated_at
        description: "Datetime when the workspace was last updated"
        example: "`2020-11-27 14:03:40`"
      - name: start_at
        description: "Datetime when the workspace resume window started"
        example: "`2020-11-27 11:22:08`"
      - name: sleep_at
        description: "Datetime when the workspace resume window ended"
        example: "`2020-11-27 14:03:40`"
      - name: type
        description: "Type of the workspace"
        example: "`streamlit`"
      - name: hostname
        description: "Hostname of the workspace"
        example: "`https://hello-world-759519.hub.north-europe.azure.keboola.com`"
      - name: data_app_runtime_hours
        description: "Runtime of the app workspace on the particular date in hours"
        example: "`2.413333`"
      - name: backend_size
        description: "Size of the app backend"
        example: "`Small`"
      - name: time_credits_used
        description: "Number of time credits consumed by the workspace on the particular date"
        example: "`2.413333`"
      - name: billed_credits_used
        description: "Number of the actually billed credits"
        example: "`2.413333`"

  - id: kbc_data_science_sandbox
    mode: project
    description: "This table lists Python/R [workspaces](/workspace/) and their consumption metrics."
    is_full_load: false
    note: "A value of `0` in `sandbox_runtime_hours`,`time_credits_used` or `billed_credits_used` means a correction was made. The row couldn't be removed due to incremental loads, so the original value was set to zero."
    columns:
      - name: kbc_data_science_sandbox_resume_id
        pk: true
        description: "Identifier of the sandbox active window (between starting and pausing the sandbox)"
        example: "`10910_kbc-eu-central-1_8c9e68ac-3a40-4aea-a62c-34ef37d12a5a`"
      - name: kbc_data_science_sandbox_id
        description: "Data science sandbox identifier"
        example: "`10910_kbc-eu-central-1`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola Project"
        example: "`1075-eu-central-1`"
      - name: date
        pk: true
        description: "Date for which the runtime hours and time credits are calculated"
        example: "`2020-11-27`"
      - name: created_at
        description: "Datetime of the sandbox creation"
        example: "`2020-11-27 11:22:08`"
      - name: expiration_at
        description: "Sandbox expiration datetime"
        example: "`2020-12-02 11:22:08`"
      - name: updated_at
        description: "Datetime when the sandbox was last updated"
        example: "`2020-11-27 14:03:40`"
      - name: start_at
        description: "Datetime when the sandbox resume window started"
        example: "`2020-11-27 11:22:08`"
      - name: sleep_at
        description: "Datetime when the sandbox resume window ended"
        example: "`2020-11-27 14:03:40`"
      - name: type
        description: "Type of the sandbox (`jupyter`, `rstudio`)"
        example: "`jupyter`"
      - name: hostname
        description: "Hostname of the sandbox"
        example: "`i-099734d8f8b97ae75-sandbox.eu-central-1.keboola.com`"
      - name: sandbox_runtime_hours
        description: "Runtime of the sandbox on the particular date in hours"
        example: "`2.413333`"
      - name: backend_size
        description: "Size of the data science backend"
        example: "`Small`"
      - name: time_credits_used
        description: "Number of time credits consumed by the sandbox on the particular date"
        example: "`2.413333`"
      - name: billed_credits_used
        description: "Number of the actually billed credits"
        example: "`2.413333`"

  - id: kbc_job
    mode: project
    description: "This table lists Keboola [jobs](/management/jobs/) (e.g., a connector job or a transformation)."
    is_full_load: false
    columns:
      - name: kbc_job_id
        pk: true
        description: "Keboola job identifier"
        example: "`117644387_kbc-eu-central-1`"
      - name: kbc_component_configuration_id
        fk: kbc_component_configuration
        description: "Foreign key to the component configuration"
        example: "`410_kbc-eu-central-1_keboola.wr-google-sheets-259642632`"
      - name: kbc_component_configuration_row_id
        description: "An array where each element serves as a foreign key to a Keboola component configuration row. This array is populated as a result of filtering rows during the job execution. If the job runs with all rows (no filtering), the array remains empty."
        example: "`[\"8765_kbc-us-east-1_keboola.ex-db-mysql_844500148_844500150\"]`"
      - name: kbc_branch_id
        fk: kbc_branch
        description: "Foreign key to the Keboola branch"
        example: "`3419_kbc-eu-central-1`"
      - name: branch_type
        description: "Identifier of the type of branch where the job is run (`default`, `dev`)"
        example: "`3419_kbc-eu-central-1`"
      - name: kbc_component_id
        description: "Identifier of the component related to the job"
        example: "`keboola.wr-google-sheets`"
      - name: transformation_type
        description: "Type of the transformation, if applicable. Possible values: <br> `R`, `Python`, `SQL`, `Unknown`: backend wasn't recognized or a new backend not yet introduced, `None` -- not a transformation job or encapsulating an apparent transformation job"
        example: "`None`"
      - name: credit_type
        description: "Type of credit associated with the job. Possible values: <br> `KBC`, `SQL`, `CDC` <br> Does not necessarily represent actually used credit, as SQL and CDC credits are only consumed if they exist in the contract ([info](/management/project/limits/#project-power--time-credits)). The type of actually billed credit is defined in the [kbc_usage_metrics_values](/components/extractors/other/telemetry-data/#kbc_usage_metrics_values) table"
        example: "`KBC`"
      - name: job_run_id
        description: "Run ID of the job -- multiple jobs can run under the same Run ID"
        example: "`117643429.117644388`"
      - name: job_start_at
        description: "Datetime when the job started"
        example: "`2020-03-15 11:59:39`"
      - name: job_created_at
        description: "Datetime when the job was created"
        example: "`2020-03-15 11:59:38`"
      - name: job_status
        description: "Status of the job (`success`, `error`, `terminated`, `processing`, `cancelled`, `warning`)"
        example: "`success`"
      - name: error_type
        description: "Type of error for unsuccessful jobs (`user`, `application`)"
        example: "`user`"
      - name: error_message
        description: "Message propagated in the error job event"
        example: "`Transformation aborted with message...`"
      - name: job_run_type
        description: "Specifies if the job was run by orchestration or manually (`orchestration`, `manual`)"
        example: "`orchestration`"
      - name: job_type
        description: "Indicates whether the job is a standard job or a container job, which encapsulates another job (such as Flow). Only `standard` jobs consume credits (`standard`, `container`, `orchestrationContainer`, `phaseContainer`)"
        example: "`orchestration`"
      - name: token_id
        description: "Identifier of the token that initiated the job"
        example: "`145062`"
      - name: token_name
        description: "Name of the token that initiated the job"
        example: "`Orchestrator GDrive`"
      - name: kbc_token_id
        description: "Unique identifier of the token with stack identification"
        example: "`145062_kbc-eu-central-1`"
      - name: flow_id
        description: "Unique identifier of the flow (Foreign key to the component configuration)"
        example: "`410_kbc-eu-central-1_keboola.orchestrator_915976687`"
      - name: flow
        description: "Name of the Flow in the time of the job, including numeric ID to distinguish between flows with the same name"
        example: "`My Main Flow (ID: 915976687)`"
      - name: job_time_credits_used
        description: "Number of time credits consumed by the job"
        example: "`0.001218890000`"
      - name: job_billed_credits_used
        description: "Number of actually billed credits"
        example: "`0.001218890000`"
      - name: job_total_time_sec
        description: "Total time of the job in seconds (from initial trigger; start may be delayed)"
        example: "`63`"
      - name: job_run_time_sec
        description: "Runtime of the job in seconds (from the time the job started)"
        example: "`62`"
      - name: job_network_mb
        description: "Data transferred via the network in MB -- used for data destination billing"
        example: "`6.094449`"
      - name: ds_backend_size
        description: "Backend used for data science transformations (`Small`, `Medium`, `Large`)"
        example: "`Small`"
      - name: dwh_small_ratio
        description: "Ratio of Small DWH used for SQL transformations (sum of ratios may be <1, may partially run on free DWH)"
        example: "`0.75`"
      - name: dwh_medium_ratio
        description: "Ratio of Medium DWH used for SQL transformations (sum of ratios may be <1, may partially run on free DWH)"
        example: "`0.25`"
      - name: dwh_large_ratio
        description: "Ratio of Large DWH used for SQL transformations (sum of ratios might be <1, may partially run on free DWH)"
        example: "`0`"
      - name: backend_size
        description: "Backend used for data science transformations (`Small`, `Medium`, `Large`)"
        example: "`Small`"
      - name: company_id
        description: "Identifier of the company the event belongs to"
        example: "`011t00000Gs3BiAAJ`"

  - id: kbc_mcp_event
    mode: project
    description: "This table captures [MCP](/ai/mcp-server/) (Model Context Protocol) interaction events -- every tool call made against a Keboola project through an MCP server. This includes calls from external MCP clients (e.g., Claude Desktop, Cursor) as well as Keboola's internal AI agents such as [Kai](/ai/kai-assistant/) and AI Chat. Each row represents a single tool invocation with its input arguments, outcome (success or error), duration, and the context of the caller."
    is_full_load: false
    columns:
      - name: kbc_mcp_event_id
        pk: true
        description: "Unique identifier of the MCP event"
        example: "`019d032f-b425-7692-bb3c-638fed287c7a_com-keboola-gcp-us-east4`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola project where the tool call was executed"
        example: "`361_com-keboola-gcp-us-east4`"
      - name: event_created_at
        description: "Timestamp when the MCP event occurred"
        example: "`2026-03-18 23:02:31.000`"
      - name: event
        description: "Event source identifier indicating the MCP server component that handled the call. Possible values include: <br> `ext.keboola.mcp-server-tool.` -- external MCP server tool call, <br> `ext.keboola.kai-assistant.` -- Kai assistant tool call, <br> `ext.keboola.ai-chat.` -- AI Chat tool call"
        example: "`ext.keboola.kai-assistant.`"
      - name: type
        description: "Outcome of the tool call (`success`, `error`)"
        example: "`success`"
      - name: kbc_token_id
        description: "Composite identifier of the token used for the MCP session (numeric ID + stack)"
        example: "`1177215_com-keboola-gcp-us-east4`"
      - name: token_name
        description: "Name of the token used for the MCP session -- typically the user's email for interactive sessions or a scheduler token name for automated calls"
        example: "`some_user@example.com`"
      - name: api_version
        description: "Version of the Keboola API used by the MCP server"
        example: "`v2`"
      - name: http_user_agent
        description: "HTTP user agent string of the MCP server, including server version, environment, and transport protocol"
        example: "`Keboola MCP Server/1.48.4 app_env=local transport=http-compat/streamable-http`"
      - name: mcp_user_agent
        description: "User agent of the MCP client connecting to the server (e.g., the IDE or AI tool). Identifies the caller application"
        example: "`claude-ai/0.1.0`"
      - name: mcp_version
        description: "Version of the Keboola MCP server that processed the call"
        example: "`1.48.4`"
      - name: mcp_environment
        description: "Deployment environment of the MCP server. `DEV` for local/external clients; production hashes for Keboola-hosted agents (Kai, AI Chat)"
        example: "`DEV`"
      - name: mcp_conversation_id
        description: "Unique identifier linking tool calls within the same conversation session. Empty for external clients that don't report conversation context"
        example: "`4a22b77b-5a08-4ec3-8477-3c6f4369c418`"
      - name: tool
        description: "Name of the MCP tool that was called (e.g., `query_data`, `get_project_info`, `create_sql_transformation`)"
        example: "`query_data`"
      - name: tool_arguments
        description: "JSON array of key-value pairs representing the arguments passed to the tool call"
        example: "`[{\"key\":\"bucket_ids\",\"value\":\"[]\"}]`"
      - name: duration
        description: "Duration of the tool call execution in seconds"
        example: "`3`"
      - name: message
        description: "Result message -- a success confirmation or the full error message for failed calls"
        example: "`MCP tool \"query_data\" call succeeded.`"
      - name: agent_type
        description: "Type of agent that made the call. Possible values: <br> `external` -- an external MCP client (Claude Desktop, Cursor, etc.), <br> `kai-assistant` -- the Keboola Kai assistant, <br> `ai-chat` -- the Keboola AI Chat"
        example: "`kai-assistant`"
      - name: is_keboola_agent_event
