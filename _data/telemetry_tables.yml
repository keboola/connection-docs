  - id: kbc_usage_metrics_values
    mode: project
    description: "This table shows aggregated values for all metrics that may be included in the contract, such as consumed credits, data in storage, and the number of users. This combines data from different data sources (tables), making it useful for providing an overview of consumption."
    is_full_load: false
    note: "A `0` value for **Apps** or **Data Science Sandbox** in `usage_breakdown` means a correction was made. The row couldn't be removed due to incremental loads, so the original value was set to zero."
    org_mode_note: "`organization_value` and `company_value` are available in **Organization** mode only. You need data for all projects."
    usage_breakdown:
      - name: "Applications"
        source: "kbc_job"
        detail: "jobs with **application** *component_type*"
      - name: "Data Science"
        source: "kbc_job"
        detail: "jobs with **R/Python** *transformation_type*"
      - name: "Data Science Sandbox"
        source: "kbc_data_science_sandbox"
        detail: "aggregation of *sandbox_runtime_hours*"
      - name: "DWH Direct Query"
        source: "kbc_snowflake_stats"
        detail: "records with **writer/dwhm** *snowflake_job_type*"
      - name: "Extractor"
        source: "kbc_job"
        detail: "jobs with **data source** *component_type*"
      - name: "KBC Users"
        source: "kbc_project_user"
        detail: "Active/Inactive state is defined based on users' activity in the last 3 days"
      - name: "KBC Projects"
        source: "kbc_project"
        detail: "existing projects per particular date"
      - name: "KBC TB"
        source: "kbc_project_snapshot"
        detail: "aggregation of *bytes*"
      - name: "Snowflake Sandbox"
        source: "kbc_snowflake_stats"
        detail: "records with **sandbox** *snowflake_job_type*"
      - name: "Transfromations"
        source: "kbc_job"
        detail: "jobs with **SQL** *transformation_type*"
      - name: "Writers"
        source: "kbc_job"
        detail: "jobs with **data destination** *component_type*"
      - name: "BAPI Receiver"
        source: ""
        detail: "~Buffer API endpoints used; only aggregated values available~ Not available after February 28, 2025, replaced by `Stream`."
      - name: "BAPI Messages"
        source: ""
        detail: "~Buffer API (data streams) usage; only aggregated values available~ Not available after February 28, 2025, replaced by `Stream GB`."
      - name: "Stream"
        source: ""
        detail: "Data Streams endpoints used; only aggregated values available"
      - name: "Streamed GB"
        source: ""
        detail: "Streamed GB into the warehouse (uncompressed); only aggregated values available"
    columns:
      - name: metrics_values_id
        pk: true
        description: "Identifier of the daily value of the usage metric (combination of the project ID, usage metric ID, metric breakdown, sandbox flag, and date)"
        example: "`779_kbc-eu-central-1_kbc_tb_KBC TB_false_2020-07-14`"
      - name: kbc_project_id
        fk: kbc_project
        description: "Foreign key to the Keboola project"
        example: "`779_kbc-eu-central-1`"
      - name: usage_metric_id
        fk: usage_metric
        description: "Identifier of the usage metric. Possible values: <br> `kbc_ppu`, `sql_ppu`, `cdc_ppu`, `kbc_tb`, `kbc_users`, `kbc_projects`"
        example: "`kbc_tb`"
      - name: date
        description: "Date of the value"
        example: "`2019-11-01`"
      - name: usage_breakdown
        description: "Breakdown of the usage metric (still the same limit, but a more detailed view of consumption for some metrics). For instance, PPU can be broken down into data destination connectors, applications, and transformations."
        example: "`DWH Direct Query`"
      - name: is_sandbox
        description: "Flag determining if the value is for sandbox"
        example: "`true`"
      - name: value
        description: "Value of the metric (always related to the particular metric, key-value pairs)"
        example: "`4.150657`"
      - name: organization_value
        description: "Organization value of the metric (used for Keboola users, where we're assigning distinct users to the single org project, so we're not calculating users more than once when looking at organization value -- a single user can be in multiple projects)"
        example: "`15`"
      - name: company_value
        description: "Similar to the organization value, but it might give a different result if the company contains more organizations"
        example: "`12`"
      - name: time_credits_value
        description: "Value in time credits for metrics calculated in credits"
        example: "`0.001667`"
      - name: run_time_hours
        description: "Runtime value in hours for metrics calculated based on time"
        example: "`0.000278`"
      - name: jobs
        description: "Number of jobs for relevant metrics"
        example: "`100`"

