        description: "Datetime when the event was created"
        example: "`2023-07-23 06:23:19`"
      - name: event
        description: "Description of the event"
        example: "`ext.keboola.data-apps.`"
      - name: message
        description: "Message describing the event"
        example: "`Streamlit App Read Table`"
      - name: kbc_token_id
        fk: kbc_token
        description: "Foreign key to the Keboola token"
        example: "`516365_kbc-us-east-1`"
      - name: token_name
        description: "Name of the token"
        example: "`streamlit write only-token`"
      - name: params
        description: "Parameters of the event (JSON object)"
        example: "`{\"event_type\":\"keboola_data_app_write\",\"event_job_id\":151808445362,\"event_application\":\"Unknown\",\"time\":\"2024-11-18 16:15:02\",\"user\":\"Unknown\"}`"

